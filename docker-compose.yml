version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ddi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ddi_user
      POSTGRES_PASSWORD: ddi_password
      POSTGRES_DB: ddi_db
    ports:
      - "5432:5432"
    volumes:
      - ddi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddi_user -d ddi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ddi_pgdata:
