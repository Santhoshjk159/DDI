services:
  # FastAPI Backend
  - type: web
    name: ddi-predict-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard from Neon
      - key: DATABASE_SYNC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false          # Set to your Vercel URL after deploy
      - key: APP_ENV
        value: production
      - key: PYTHONIOENCODING
        value: utf-8
    autoDeploy: true
